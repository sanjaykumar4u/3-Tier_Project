name: DevSecOps CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # Stage 1: Secret Scanning
  gitleaks:
    name: GitLeaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 2 (Parallel) - Infrastructure & Code Scanning
  checkov:
    name: Checkov IaC Scan
    needs: gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        run: |
          pip install checkov
          checkov -d . \
            --skip-check CKV_DOCKER_2 \
            --framework all \
            --quiet \
            --exit-code 0 || true
        continue-on-error: true

  trivy-fs:
    name: Trivy Filesystem Scan
    needs: gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-report.sarif'

      - name: Upload Trivy FS Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-fs-report.sarif'

  trivy-config:
    name: Trivy Config Scan
    needs: gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config-report.sarif'

      - name: Upload Trivy Config Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-config-report.sarif'

  lint:
    name: Code Lint & Format Check
    needs: gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint || true
        continue-on-error: true

      - name: Run Prettier (if configured)
        run: npm run format:check || true
        continue-on-error: true

  tests:
    name: Unit Tests
    needs: gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        id: jest
        run: |
          npm test -- --coverage --watchAll=false || true
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: coverage/
          retention-days: 30

  # Stage 3: Quality & Security Analysis
  sonarcloud:
    name: SonarCloud Analysis
    needs:
      - checkov
      - trivy-fs
      - trivy-config
      - lint
      - tests
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=sanjaykumar4u_3-Tier_Project
            -Dsonar.organization=sanjaykumar4u
        continue-on-error: true

  # Final Report
  security-report:
    name: Security Report Summary
    needs:
      - gitleaks
      - checkov
      - trivy-fs
      - trivy-config
      - lint
      - tests
      - sonarcloud
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate Security Summary
        run: |
          echo "# DevSecOps Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitLeaks: Secret scanning completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Checkov: Infrastructure as Code scanning completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Trivy: Filesystem & configuration scanning completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Linting: Code quality checks completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit Tests: Test execution completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SonarCloud: Code quality analysis completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All artifacts are available in the Actions tab for review." >> $GITHUB_STEP_SUMMARY
