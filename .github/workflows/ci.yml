name: DevSecOps CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── Stage 1: Secret scanning (gate for everything else) ──────────────────
  gitleaks:
    name: GitLeaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # ← fixed: v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 2: Parallel scans (all need gitleaks to pass) ──────────────────
  checkov:
    name: Checkov IaC Scan
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # ← fixed: v4
        with:
          fetch-depth: 0                   # ← added: full history for accuracy

      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@v12
        with:
          output_format: cli,sarif
          output_file_path: console,results.sarif
        continue-on-error: true

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: results.sarif
          category: checkov

  trivy-fs:
    name: Trivy Filesystem Scan
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # ← fixed: v4
        with:
          fetch-depth: 0                   # ← added

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@d63571eff523cfe8e63f7f1688f8eba34ada9cfa  # ← fixed: pinned to commit SHA (0.35.0)
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-report.sarif
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy FS Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-report.sarif
          category: trivy-fs

  trivy-config:
    name: Trivy Config Scan
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # ← fixed: v4
        with:
          fetch-depth: 0                   # ← added

      - name: Run Trivy Config Scan
        uses: aquasecurity/trivy-action@d63571eff523cfe8e63f7f1688f8eba34ada9cfa  # ← fixed: pinned to commit SHA (0.35.0)
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config-report.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: Upload Trivy Config Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config-report.sarif
          category: trivy-config

  lint:
    name: Code Lint & Format Check
    needs: gitleaks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [client, server]
    steps:
      - uses: actions/checkout@v4          # ← fixed: v4

      - name: Set up Node.js
        uses: actions/setup-node@v4        # ← fixed: v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.workspace }}
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run Prettier Check
        working-directory: ${{ matrix.workspace }}
        run: npm run format:check --if-present
        continue-on-error: true

  tests:
    name: Unit Tests
    needs: gitleaks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [client, server]
    steps:
      - uses: actions/checkout@v4          # ← fixed: v4

      - name: Set up Node.js
        uses: actions/setup-node@v4        # ← fixed: v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.workspace }}
        run: npm run build --if-present

      - name: Run Unit Tests
        working-directory: ${{ matrix.workspace }}
        env:
          CI: true
        run: npm test --if-present
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/coverage/
          retention-days: 30
          if-no-files-found: warn

  # ── Stage 3: Code quality (waits for all scans) ──────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    needs:
      - checkov
      - trivy-fs
      - trivy-config
      - lint
      - tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4          # ← fixed: v4
        with:
          fetch-depth: 0                   # Full history improves analysis quality

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=sanjaykumar4u_3-Tier_Project
            -Dsonar.organization=sanjaykumar4u
        continue-on-error: true

  # ── Final: Summary report ─────────────────────────────────────────────────
  security-report:
    name: Security Report Summary
    needs:
      - gitleaks
      - checkov
      - trivy-fs
      - trivy-config
      - lint
      - tests
      - sonarcloud
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate Security Summary
        env:
          GITLEAKS_STATUS:  ${{ needs.gitleaks.result }}
          CHECKOV_STATUS:   ${{ needs.checkov.result }}
          TRIVY_FS_STATUS:  ${{ needs.trivy-fs.result }}
          TRIVY_CFG_STATUS: ${{ needs.trivy-config.result }}
          LINT_STATUS:      ${{ needs.lint.result }}
          TESTS_STATUS:     ${{ needs.tests.result }}
          SONAR_STATUS:     ${{ needs.sonarcloud.result }}
        run: |
          status_icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⏹️" ;;
              *)         echo "⚠️" ;;
            esac
          }

          echo "# DevSecOps Pipeline Report"                                                                >> $GITHUB_STEP_SUMMARY
          echo ""                                                                                            >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results Summary"                                                                    >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |"                                                                         >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|"                                                                         >> $GITHUB_STEP_SUMMARY
          echo "| $(status_icon "$GITLEAKS_STATUS")  GitLeaks – Secret Scanning  | \`$GITLEAKS_STATUS\`  |" >> $GITHUB_STEP_SUMMARY
          echo "| $(status_icon "$CHECKOV_STATUS")   Checkov – IaC Scanning      | \`$CHECKOV_STATUS\`   |" >> $GITHUB_STEP_SUMMARY
          echo "| $(status_icon "$TRIVY_FS_STATUS")  Trivy – Filesystem Scan     | \`$TRIVY_FS_STATUS\`  |" >> $GITHUB_STEP_SUMMARY
          echo "| $(status_icon "$TRIVY_CFG_STATUS") Trivy – Config Scan         | \`$TRIVY_CFG_STATUS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| $(status_icon "$LINT_STATUS")      Lint & Format Check         | \`$LINT_STATUS\`      |" >> $GITHUB_STEP_SUMMARY
          echo "| $(status_icon "$TESTS_STATUS")     Unit Tests                  | \`$TESTS_STATUS\`     |" >> $GITHUB_STEP_SUMMARY
          echo "| $(status_icon "$SONAR_STATUS")     SonarCloud – Code Quality   | \`$SONAR_STATUS\`     |" >> $GITHUB_STEP_SUMMARY
          echo ""                                                                                            >> $GITHUB_STEP_SUMMARY
          echo "Artifacts and coverage are in the **Actions → Artifacts** tab."                            >> $GITHUB_STEP_SUMMARY
