name: DevSecOps CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # Stage 1: Secret Scanning
  gitleaks:
    name: GitLeaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 2 (Parallel) - Infrastructure & Code Scanning
  checkov:
    name: Checkov IaC Scan
    needs: gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: |
          pip install --upgrade pip
          pip install checkov

      - name: Run Checkov
        id: checkov
        run: |
          checkov -d . \
            --skip-check CKV_DOCKER_2 \
            --framework all \
            --output cli \
            --soft-fail || true
        continue-on-error: true

      - name: Upload Checkov Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: checkov-report
          path: checkov-report.json
          retention-days: 30

  trivy-fs:
    name: Trivy Filesystem Scan
    needs: gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-report.sarif'

      - name: Upload Trivy FS Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-fs-report.sarif'

  trivy-config:
    name: Trivy Config Scan
    needs: gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config-report.sarif'

      - name: Upload Trivy Config Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-config-report.sarif'

  lint:
    name: Code Lint & Format Check
    needs: gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python Linters
        run: |
          pip install --upgrade pip
          pip install pylint flake8 black isort

      - name: Run Python Linters
        id: pylint
        run: |
          echo "=== Running Flake8 ==="
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          
          echo "=== Running Black (check mode) ==="
          black . --check --diff || true
          
          echo "=== Running isort (check mode) ==="
          isort . --check-only --diff || true
        continue-on-error: true

      - name: Install Node Linters (if applicable)
        if: hashFiles('package.json') != ''
        run: |
          npm install
          npm run lint || true
        continue-on-error: true

  tests:
    name: Unit Tests
    needs: gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run Python Unit Tests
        id: pytest
        run: |
          pytest . \
            --junitxml=junit.xml \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            -v || true
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: junit.xml
          retention-days: 30

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

      - name: Publish Coverage to PR
        if: always()
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

  # Stage 3: Quality & Security Analysis
  sonarcloud:
    name: SonarCloud Analysis
    needs:
      - checkov
      - trivy-fs
      - trivy-config
      - lint
      - tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=sanjaykumar4u_3-Tier_Project
            -Dsonar.organization=sanjaykumar4u
        continue-on-error: true

  # Final Report
  security-report:
    name: Security Report Summary
    needs:
      - gitleaks
      - checkov
      - trivy-fs
      - trivy-config
      - lint
      - tests
      - sonarcloud
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate Security Summary
        run: |
          echo "# DevSecOps Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitLeaks: Secret scanning completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Checkov: Infrastructure as Code scanning completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Trivy: Filesystem & configuration scanning completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Linting: Code quality checks completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit Tests: Test execution completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SonarCloud: Code quality analysis completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All artifacts are available in the Actions tab for review." >> $GITHUB_STEP_SUMMARY
