services:
  # ---- Database tier ----
  mysql:
    image: mysql:8.0
    container_name: user-platform-db
    restart: unless-stopped
    # The legacy `mysql` npm client (v2.x) doesn't support MySQL 8's default
    # caching_sha2_password auth, so fall back to mysql_native_password.
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: test_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- App tier (Express API + bundled frontend, single image) ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-platform-app
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: appuser
      DB_PASSWORD: password123
      DB_NAME: test_db
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  db_data:
